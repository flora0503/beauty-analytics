<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高级美颜用量分析看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;line-height:1.5}
a{color:#3b82f6;text-decoration:none}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:24px 0;text-align:center;border-bottom:1px solid #334155}
.header h1{font-size:24px;color:#f1f5f9;margin-bottom:4px}
.header p{color:#94a3b8;font-size:13px}
.week-badge{display:inline-block;background:#3b82f6;color:#fff;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-left:8px;vertical-align:middle}
.container{max-width:1440px;margin:0 auto;padding:20px}

/* Upload */
.upload-box{border:2px dashed #334155;border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all .3s;background:#1e293b;margin-bottom:20px}
.upload-box:hover,.upload-box.drag-over{border-color:#3b82f6;background:#1e3a5f}
.upload-box h3{color:#94a3b8;font-size:15px;margin-bottom:4px}
.upload-box p{color:#64748b;font-size:12px}
.upload-box input{display:none}
.upload-status{margin-top:10px;font-size:12px;color:#10b981;display:none}
.upload-status.error{color:#f43f5e}

/* Customer Checkboxes */
.filter-panel{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:16px}
.filter-panel-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.filter-panel-header span{color:#94a3b8;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.quick-btn{background:#0f172a;color:#94a3b8;border:1px solid #334155;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s}
.quick-btn:hover,.quick-btn.active{border-color:#3b82f6;color:#3b82f6;background:#1e3a5f}
.cust-grid{display:flex;flex-wrap:wrap;gap:6px}
.cust-chip{display:flex;align-items:center;gap:4px;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .2s;color:#94a3b8;user-select:none}
.cust-chip:hover{border-color:#475569}
.cust-chip.checked{border-color:#3b82f6;color:#e2e8f0;background:#1e3a5f}
.cust-chip input{display:none}
.cust-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-online{background:#10b981}.dot-test{background:#f59e0b}

/* Controls */
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.controls select,.controls button{background:#1e293b;color:#e2e8f0;border:1px solid #334155;padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer}
.controls button.danger{border-color:#f43f5e;color:#f43f5e}
.data-info{color:#64748b;font-size:11px;margin-left:auto}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px}
.kpi-card{background:#1e293b;border-radius:10px;padding:16px;border:1px solid #334155}
.kpi-label{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:700}
.kpi-sub{font-size:10px;color:#64748b;margin-top:2px}
.blue{color:#3b82f6}.green{color:#10b981}.amber{color:#f59e0b}.rose{color:#f43f5e}.purple{color:#a78bfa}.cyan{color:#06b6d4}

/* Sections */
.section{margin-bottom:24px}
.section-title{font-size:15px;font-weight:600;color:#f1f5f9;margin-bottom:12px;padding-left:10px;border-left:3px solid #3b82f6}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.chart-box{background:#1e293b;border-radius:10px;padding:16px;border:1px solid #334155}
.chart-box.full{grid-column:1/-1}
.chart{width:100%;height:360px}
.chart.tall{height:420px}

/* Table */
.table-wrap{max-height:480px;overflow-y:auto;border-radius:8px;border:1px solid #334155}
table{width:100%;border-collapse:collapse}
th,td{padding:7px 10px;text-align:left;border-bottom:1px solid #334155;font-size:11px}
th{background:#334155;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{color:#cbd5e1}
tr:hover td{background:#1e3a5f}
.badge{display:inline-block;padding:1px 7px;border-radius:9999px;font-size:10px;font-weight:600}
.badge-on{background:rgba(16,185,129,.15);color:#10b981}
.badge-test{background:rgba(251,191,36,.15);color:#fbbf24}
.feature-bar{display:inline-block;height:12px;border-radius:2px;margin-right:1px;vertical-align:middle}
.pct-up{color:#10b981}.pct-down{color:#f43f5e}.pct-flat{color:#64748b}

/* Weekly Report */
.report-section{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:20px;margin-bottom:24px}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.report-header h3{color:#f1f5f9;font-size:15px}
.report-tabs{display:flex;gap:6px}
.report-tab{background:#0f172a;border:1px solid #334155;color:#94a3b8;padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer}
.report-tab.active{border-color:#3b82f6;color:#3b82f6;background:#1e3a5f}
.report-text{width:100%;min-height:120px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:12px;font-size:12px;font-family:inherit;resize:vertical;line-height:1.6}
.report-text:focus{outline:none;border-color:#3b82f6}
.report-actions{display:flex;gap:8px;margin-top:8px}
.report-actions button{background:#3b82f6;color:#fff;border:none;padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer}
.report-actions button.secondary{background:transparent;border:1px solid #334155;color:#94a3b8}
.report-display{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:14px;font-size:12px;color:#cbd5e1;line-height:1.7;white-space:pre-wrap;min-height:60px}
.report-display b{color:#f1f5f9}

/* Timeline */
.tl-item{padding:10px 0 10px 24px;border-left:2px solid #334155;position:relative;font-size:12px}
.tl-item::before{content:'';position:absolute;left:-5px;top:14px;width:8px;height:8px;background:#334155;border-radius:50%}
.tl-item.launch::before{background:#10b981}.tl-item.sdk::before{background:#3b82f6}.tl-item.biz::before{background:#f59e0b}
.tl-week{color:#94a3b8;font-size:11px;font-weight:600;margin-bottom:2px}
.tl-tag{display:inline-block;padding:0 6px;border-radius:4px;font-size:9px;margin-left:6px}
.tl-tag.sdk{background:rgba(59,130,246,.15);color:#3b82f6}.tl-tag.online{background:rgba(16,185,129,.15);color:#10b981}.tl-tag.biz{background:rgba(245,158,11,.15);color:#f59e0b}
.tl-text{color:#cbd5e1}
.tl-text b{color:#f1f5f9}

@media(max-width:900px){.chart-row{grid-template-columns:1fr}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <h1>高级美颜用量分析看板 <span class="week-badge" id="weekBadge"></span></h1>
  <p id="headerInfo">拖入 DataLego 导出的 CSV 文件即可更新数据</p>
</div>
<div class="container">

<div class="upload-box" id="dropZone">
  <h3>拖入 CSV 文件 或 点击选择（支持多文件）</h3>
  <p>自动识别 date/vid/pkg_name/os/ver/total_beauty_uid_count/shape/makeup/filter/sticker/total_host_video_minutes</p>
  <input type="file" id="fileInput" accept=".csv" multiple>
  <div class="upload-status" id="uploadStatus"></div>
</div>

<div class="filter-panel">
  <div class="filter-panel-header">
    <span>客户筛选</span>
    <button class="quick-btn" onclick="selectAll()">全选</button>
    <button class="quick-btn" onclick="selectOnline()">仅线上</button>
    <button class="quick-btn" onclick="selectTest()">仅测试</button>
    <button class="quick-btn" onclick="selectNone()">清空</button>
  </div>
  <div class="cust-grid" id="custGrid"></div>
</div>

<div class="controls">
  <select id="filterRange"><option value="all">全部日期</option><option value="7">最近7天</option><option value="14">最近14天</option><option value="30">最近30天</option></select>
  <button onclick="exportCSV()">导出数据</button>
  <button class="danger" onclick="clearData()">清空数据</button>
  <span class="data-info" id="dataInfo"></span>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="section"><div class="section-title">每日主播使用量趋势</div>
  <div class="chart-box full"><div id="cDailyUid" class="chart tall"></div></div></div>

<div class="section"><div class="section-title">每日视频分钟数趋势（按客户）</div>
  <div class="chart-box full"><div id="cDailyMin" class="chart tall"></div></div></div>

<div class="section"><div class="section-title">周维度趋势与对比</div>
  <div class="chart-row">
    <div class="chart-box"><div id="cWeekUid" class="chart"></div></div>
    <div class="chart-box"><div id="cWeekMin" class="chart"></div></div>
  </div>
  <div class="chart-box full"><div id="weekTable"></div></div>
</div>

<div class="section"><div class="section-title">按平台维度分析</div>
  <div class="chart-row">
    <div class="chart-box"><div id="cOsTrend" class="chart"></div></div>
    <div class="chart-box"><div id="cOsPie" class="chart"></div></div>
  </div></div>

<div class="section"><div class="section-title">美颜功能使用分布</div>
  <div class="chart-row">
    <div class="chart-box"><div id="cFeatPie" class="chart"></div></div>
    <div class="chart-box"><div id="cFeatTrend" class="chart"></div></div>
  </div></div>

<div class="section"><div class="section-title">各客户美颜功能使用情况</div>
  <div class="chart-box full"><div id="cCustFeat" class="chart tall"></div></div>
  <div class="chart-box full" style="margin-top:12px"><div id="custFeatTable"></div></div>
</div>

<div class="section"><div class="section-title">线上客户每日趋势</div>
  <div class="chart-box full"><div id="cCustTrend" class="chart tall"></div></div></div>

<div class="section"><div class="section-title">客户周度对比</div>
  <div class="chart-box full"><div id="cCustWeek" class="chart tall"></div></div>
  <div class="chart-box full" style="margin-top:12px"><div id="custWeekTable"></div></div>
</div>

<div class="section"><div class="section-title">商业化进展 & 周报</div>
  <div class="chart-row">
    <div class="chart-box"><div id="cFunnel" class="chart"></div></div>
    <div class="chart-box"><div id="cPipeline" class="chart"></div></div>
  </div>
  <div class="chart-box full" style="margin-top:12px"><div class="section-title" style="margin-bottom:8px">里程碑</div><div id="timeline"></div></div>
  <div class="report-section" style="margin-top:12px" id="reportSection">
    <div class="report-header">
      <h3 id="reportTitle">周报记录</h3>
      <div class="report-tabs" id="reportTabs"></div>
    </div>
    <div id="reportBody"></div>
  </div>
</div>

</div>

<script>
// ========================= CONSTANTS =========================
const SK='beauty_v3',SK_REPORT='beauty_reports';
const VID_MAP={"544407":"kittenChat测试","946320":"kittenChat线上","1569974":"鲸旗线上","1570586":"鲸旗测试","1028123":"字节微科线上","1028124":"字节微科测试","1664083":"秒榜线上","1626089":"秒榜测试","1293695":"成都煜展测试","370277":"山东千千飞测试","1538022":"元蓬测试","1629106":"Erato","130451":"声网（内部测试账号）","1019272":"声动互娱","251734":"核桃线上","521771":"成都煜展线上","1655313":"秒榜测试2","1597112":"自然选择测试","1376771":"核桃测试"};
const D=0,V=1,P=2,O=3,VR=4,U=5,M=6,C=7,SH=8,MK=9,FI=10,ST=11;
const isOn=c=>c&&c.includes('线上')&&!c.includes('测试');
const fmtD=d=>`${String(d).slice(0,4)}-${String(d).slice(4,6)}-${String(d).slice(6)}`;
const shortD=d=>`${String(d).slice(4,6)}-${String(d).slice(6)}`;
const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316','#6366f1','#14b8a6','#84cc16','#e879f9'];
const FC={'美型':'#3b82f6','美妆':'#ec4899','滤镜':'#f59e0b','贴纸':'#10b981'};
const FN=['美型','美妆','滤镜','贴纸'],FI_IDX=[SH,MK,FI,ST];
function pctStr(v){return v>0?`<span class="pct-up">+${v.toFixed(1)}%</span>`:v<0?`<span class="pct-down">${v.toFixed(1)}%</span>`:`<span class="pct-flat">0%</span>`;}

function isoWeekNum(d){const dt=new Date(String(d).slice(0,4)+'-'+String(d).slice(4,6)+'-'+String(d).slice(6));dt.setHours(0,0,0,0);dt.setDate(dt.getDate()+3-(dt.getDay()+6)%7);const w1=new Date(dt.getFullYear(),0,4);return Math.round(((dt-w1)/864e5-3+(w1.getDay()+6)%7)/7+1);}
function isoWeekLabel(d){return 'W'+String(isoWeekNum(d)).padStart(2,'0');}
function currentWeek(){const now=new Date();now.setHours(0,0,0,0);now.setDate(now.getDate()+3-(now.getDay()+6)%7);const w1=new Date(now.getFullYear(),0,4);return Math.round(((now-w1)/864e5-3+(w1.getDay()+6)%7)/7+1);}

// ========================= DATA =========================
function loadData(){const r=localStorage.getItem(SK);return r?JSON.parse(r):[];}
function saveData(rows){localStorage.setItem(SK,JSON.stringify(rows));}
function dedup(r){return`${r[D]}_${r[V]}_${r[P]}_${r[O]}_${r[VR]}`;}
function mergeData(ex,nw){const m=new Map();ex.forEach(r=>m.set(dedup(r),r));let a=0;nw.forEach(r=>{const k=dedup(r);if(!m.has(k))a++;m.set(k,r);});const merged=[...m.values()].sort((a,b)=>a[D]-b[D]);return{merged,added:a};}

function parseCSV(text){
  const res=Papa.parse(text.trim(),{header:true,skipEmptyLines:true});
  return res.data.map(r=>{
    const vid=parseInt(r.vid)||0;
    return[parseInt(r.date)||0,vid,r.pkg_name||'',r.os||'',r.ver||'',
      parseInt(r.total_beauty_uid_count||r.unique_uid_count)||0,
      parseFloat(r.total_host_video_minutes)||0,
      VID_MAP[String(vid)]||`未知(${vid})`,
      parseInt(r.shape_uid_count)||0,parseInt(r.makeup_uid_count)||0,
      parseInt(r.filter_uid_count)||0,parseInt(r.sticker_uid_count)||0];
  }).filter(r=>r[D]>20200101);
}

// ========================= UPLOAD =========================
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),statusEl=document.getElementById('uploadStatus');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');handleFiles(e.dataTransfer.files);});
fileInput.addEventListener('change',e=>handleFiles(e.target.files));

function handleFiles(files){
  let all=[];let n=0;const csvFiles=[...files].filter(f=>f.name.endsWith('.csv'));
  if(!csvFiles.length){showSt('请上传CSV文件',1);return;}
  csvFiles.forEach(f=>{const rd=new FileReader();rd.onload=e=>{
    try{all=all.concat(parseCSV(e.target.result));n++;
      if(n===csvFiles.length){const ex=loadData();const{merged,added}=mergeData(ex,all);saveData(merged);
        showSt(`导入 ${all.length} 行，新增 ${added}，共 ${merged.length} 行`);buildCustPanel();renderAll();}
    }catch(err){showSt('解析失败：'+err.message,1);}};rd.readAsText(f);});
}
function showSt(m,e){statusEl.textContent=m;statusEl.className='upload-status'+(e?' error':'');statusEl.style.display='block';}
function clearData(){if(confirm('确定清空所有数据？')){localStorage.removeItem(SK);buildCustPanel();renderAll();showSt('已清空');}}
function exportCSV(){const rows=loadData();if(!rows.length)return alert('无数据');
  let csv='date,vid,pkg_name,os,ver,unique_uid_count,total_host_video_minutes,customer,shape_uid_count,makeup_uid_count,filter_uid_count,sticker_uid_count\n';
  rows.forEach(r=>{csv+=r.map(v=>`"${v}"`).join(',')+'\n';});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download=`美颜数据_${new Date().toISOString().slice(0,10)}.csv`;a.click();}

// ========================= CUSTOMER PANEL =========================
let selectedCusts=new Set();
function buildCustPanel(){
  const rows=loadData();
  const custs=[...new Set(rows.map(r=>r[C]))].sort((a,b)=>{const ao=isOn(a)?0:1,bo=isOn(b)?0:1;return ao-bo||a.localeCompare(b);});
  selectedCusts=new Set(custs);
  const grid=document.getElementById('custGrid');
  grid.innerHTML=custs.map(c=>`<label class="cust-chip checked" data-c="${c}"><input type="checkbox" checked><span class="dot ${isOn(c)?'dot-online':'dot-test'}"></span>${c}</label>`).join('');
  grid.querySelectorAll('.cust-chip').forEach(el=>{
    el.addEventListener('click',e=>{
      const cb=el.querySelector('input');
      const c=el.dataset.c;
      if(cb.checked){selectedCusts.delete(c);cb.checked=false;el.classList.remove('checked');}
      else{selectedCusts.add(c);cb.checked=true;el.classList.add('checked');}
      renderAll();
      e.preventDefault();
    });
  });
}
function selectAll(){document.querySelectorAll('.cust-chip').forEach(el=>{el.classList.add('checked');el.querySelector('input').checked=true;selectedCusts.add(el.dataset.c);});renderAll();}
function selectNone(){document.querySelectorAll('.cust-chip').forEach(el=>{el.classList.remove('checked');el.querySelector('input').checked=false;});selectedCusts.clear();renderAll();}
function selectOnline(){document.querySelectorAll('.cust-chip').forEach(el=>{const on=isOn(el.dataset.c);el.classList.toggle('checked',on);el.querySelector('input').checked=on;if(on)selectedCusts.add(el.dataset.c);else selectedCusts.delete(el.dataset.c);});renderAll();}
function selectTest(){document.querySelectorAll('.cust-chip').forEach(el=>{const t=!isOn(el.dataset.c);el.classList.toggle('checked',t);el.querySelector('input').checked=t;if(t)selectedCusts.add(el.dataset.c);else selectedCusts.delete(el.dataset.c);});renderAll();}

document.getElementById('filterRange').addEventListener('change',renderAll);

// ========================= CHART HELPERS =========================
const TH={backgroundColor:'transparent',textStyle:{color:'#94a3b8'},tooltip:{backgroundColor:'#1e293b',borderColor:'#334155',textStyle:{color:'#e2e8f0',fontSize:12}}};
const charts={};
function gc(id){if(charts[id])charts[id].dispose();charts[id]=echarts.init(document.getElementById(id));return charts[id];}
window.addEventListener('resize',()=>Object.values(charts).forEach(c=>c&&c.resize()));
const yv={type:'value',splitLine:{lineStyle:{color:'#1e293b'}},axisLabel:{color:'#64748b',fontSize:10},axisTick:{show:false},axisLine:{show:false}};
const lgd=d=>({textStyle:{color:'#94a3b8',fontSize:10},bottom:0,type:'scroll',data:d});

function getFiltered(){
  let rows=loadData().filter(r=>selectedCusts.has(r[C]));
  const rf=document.getElementById('filterRange').value;
  if(rf!=='all'){const ds=[...new Set(rows.map(r=>r[D]))].sort();const cut=ds[Math.max(0,ds.length-parseInt(rf))];rows=rows.filter(r=>r[D]>=cut);}
  return rows;
}

// ========================= RENDER =========================
function renderAll(){
  const cw=currentWeek();
  document.getElementById('weekBadge').textContent=`第 ${cw} 周`;
  const rows=getFiltered(),allRows=loadData();
  const dates=[...new Set(rows.map(r=>r[D]))].sort(),sd=dates.map(shortD);
  const allDates=[...new Set(allRows.map(r=>r[D]))].sort();
  document.getElementById('dataInfo').textContent=allRows.length?`共 ${allRows.length} 条 | ${fmtD(allDates[0])} ~ ${fmtD(allDates[allDates.length-1])}`:'';
  document.getElementById('headerInfo').textContent=allRows.length?`数据范围：${fmtD(allDates[0])} ~ ${fmtD(allDates[allDates.length-1])} | ${allDates.length} 天 | 当前第 ${cw} 周`:'拖入 CSV 开始分析';
  if(!rows.length){renderEmpty();return;}

  // Aggregations
  const dU={},dM={},dOnU={},dTestU={},dF={};
  const cT={},cM={},cDU={},osU={},oDU={};
  const cF={};
  dates.forEach(d=>{dU[d]=0;dM[d]=0;dOnU[d]=0;dTestU[d]=0;dF[d]=[0,0,0,0];});
  rows.forEach(r=>{
    const d=r[D],u=r[U],m=r[M],c=r[C],os=r[O];
    dU[d]+=u;dM[d]+=m;if(isOn(c))dOnU[d]+=u;else dTestU[d]+=u;

  // C2: Daily Min by Customer

  // Weekly aggregation

  });
  ct+='</tbody></table></div>';
  document.getElementById('custWeekTable').innerHTML=ct;

  renderBiz();
  renderReport();
}

// ========================= WEEKLY REPORT =========================
let reportWeek=null;
function loadReports(){const r=localStorage.getItem(SK_REPORT);return r?JSON.parse(r):{};}
function saveReports(d){localStorage.setItem(SK_REPORT,JSON.stringify(d));}

function renderReport(){
  const cw=currentWeek();
  if(!reportWeek)reportWeek=cw;
  const tabs=document.getElementById('reportTabs');
  const wks=[];for(let w=Math.max(1,cw-4);w<=cw;w++)wks.push(w);
  tabs.innerHTML=wks.map(w=>`<button class="report-tab${w===reportWeek?' active':''}" onclick="switchReport(${w})">W${String(w).padStart(2,'0')}${w===cw?' (本周)':''}</button>`).join('');
  document.getElementById('reportTitle').textContent=`周报记录 — 第 ${reportWeek} 周`;

  const reports=loadReports();
  const key='W'+String(reportWeek).padStart(2,'0');
  const saved=reports[key]||'';

  document.getElementById('reportBody').innerHTML=`
    <textarea class="report-text" id="reportText" placeholder="粘贴 Obsidian 周报内容...&#10;&#10;支持格式：&#10;- 客户进展&#10;- SDK 发布&#10;- 关键里程碑">${saved}</textarea>
    <div class="report-actions">
      <button onclick="saveReport()">保存</button>
      <button class="secondary" onclick="clearReport()">清空本周</button>
    </div>`;
}

function switchReport(w){reportWeek=w;renderReport();}
function saveReport(){
  const text=document.getElementById('reportText').value;
  const reports=loadReports();
  const key='W'+String(reportWeek).padStart(2,'0');
  reports[key]=text;saveReports(reports);
  showSt(`W${String(reportWeek).padStart(2,'0')} 周报已保存`);
}
function clearReport(){
  const reports=loadReports();
  const key='W'+String(reportWeek).padStart(2,'0');
  delete reports[key];saveReports(reports);
  document.getElementById('reportText').value='';
}

}
